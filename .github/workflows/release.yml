name: Release

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    build:
        name: Build ${{ matrix.rid }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      rid: win-x64
                      preset: Windows Desktop
                      output: chromonia.exe
                    - os: ubuntu-latest
                      rid: linux-x64
                      preset: Linux
                      output: chromonia
                    - os: macos-15
                      rid: osx-universal
                      preset: macOS
                      output: chromonia.zip

        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    lfs: true

            -   name: Setup .NET
                uses: actions/setup-dotnet@v4
                with:
                    dotnet-version: '8.0.x'

            -   name: Cache NuGet packages
                uses: actions/cache@v4
                with:
                    path: ~/.nuget/packages
                    key: nuget-${{ runner.os }}-${{ hashFiles('Game/**/*.csproj') }}
                    restore-keys: nuget-${{ runner.os }}-

            -   name: Setup Godot
                uses: chickensoft-games/setup-godot@v2
                with:
                    version: 4.6.1
                    use-dotnet: true
                    include-templates: true
                    cache: true

            -   name: Import project assets
                shell: bash
                working-directory: Game
                env:
                    GODOT_DISABLE_LEAK_CHECKS: 1
                run: godot --headless --import

            -   name: Export
                shell: bash
                working-directory: Game
                env:
                    EnableVersionBump: false
                run: |
                    mkdir -p ../publish/${{ matrix.rid }}
                    godot --headless --export-release "${{ matrix.preset }}" ../publish/${{ matrix.rid }}/${{ matrix.output }}

            -   name: Upload build artifact
                uses: actions/upload-artifact@v4
                with:
                    name: publish-${{ matrix.rid }}
                    path: publish/${{ matrix.rid }}

    pack:
        name: Pack ${{ matrix.rid }}
        needs: build
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      rid: win-x64
                    - os: ubuntu-latest
                      rid: linux-x64
                    - os: macos-15
                      rid: osx-universal

        permissions:
            contents: write

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup .NET
                uses: actions/setup-dotnet@v4
                with:
                    dotnet-version: '8.0.x'

            -   name: Download build artifact
                uses: actions/download-artifact@v4
                with:
                    name: publish-${{ matrix.rid }}
                    path: publish/${{ matrix.rid }}

            -   name: Cache Velopack CLI
                uses: actions/cache@v4
                with:
                    path: ~/.dotnet/tools
                    key: velopack-cli-${{ runner.os }}

            -   name: Install Velopack CLI
                run: dotnet tool install -g vpk || true

            -   name: Pack (Windows)
                if: matrix.rid == 'win-x64'
                shell: pwsh
                run: |
                    $version = $env:GITHUB_REF_NAME -replace '^v', ''
                    vpk pack `
                      --packId Chromonia `
                      --packVersion $version `
                      --packDir publish/win-x64 `
                      --mainExe chromonia.exe `
                      --channel win `
                      --outputDir velopack-out

            -   name: Pack (macOS)
                if: matrix.rid == 'osx-universal'
                shell: bash
                run: |
                    version=$(echo $GITHUB_REF_NAME | sed 's/^v//')
                    unzip publish/osx-universal/chromonia.zip -d publish/osx-universal/app
                    vpk pack \
                      --packId Chromonia \
                      --packVersion $version \
                      --packDir publish/osx-universal/app/Chromonia.app \
                      --mainExe Chromonia \
                      --channel osx \
                      --outputDir velopack-out

            -   name: Pack (Linux)
                if: matrix.rid == 'linux-x64'
                shell: bash
                run: |
                    version=$(echo $GITHUB_REF_NAME | sed 's/^v//')
                    vpk pack \
                      --packId Chromonia \
                      --packVersion $version \
                      --packDir publish/linux-x64 \
                      --mainExe chromonia \
                      --icon Game/icon.png \
                      --channel linux \
                      --outputDir velopack-out

            -   name: Upload to GitHub release
                shell: bash
                run: gh release upload ${{ github.ref_name }} velopack-out/*
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    publish-itch:
        name: Publish itch.io ${{ matrix.rid }}
        needs: build
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - rid: win-x64
                      channel: windows
                    - rid: linux-x64
                      channel: linux
                    - rid: osx-universal
                      channel: mac

        steps:
            -   name: Download build artifact
                uses: actions/download-artifact@v4
                with:
                    name: publish-${{ matrix.rid }}
                    path: publish/${{ matrix.rid }}

            -   name: Install butler
                run: |
                    curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
                    unzip butler.zip
                    chmod +x butler
                    ./butler -V

            -   name: Package (Windows / Linux)
                if: matrix.rid != 'osx-universal'
                run: |
                    version=$(echo $GITHUB_REF_NAME | sed 's/^v//')
                    cd publish/${{ matrix.rid }}
                    zip -r ../../chromonia-${version}-${{ matrix.channel }}.zip .

            -   name: Package (macOS)
                if: matrix.rid == 'osx-universal'
                run: |
                    version=$(echo $GITHUB_REF_NAME | sed 's/^v//')
                    unzip publish/osx-universal/chromonia.zip -d publish/osx-universal/app
                    cd publish/osx-universal/app
                    zip -r ../../../chromonia-${version}-${{ matrix.channel }}.zip .

            -   name: Upload to itch.io
                run: |
                    version=$(echo $GITHUB_REF_NAME | sed 's/^v//')
                    ./butler push chromonia-${version}-${{ matrix.channel }}.zip juanmedina/chromonia:${{ matrix.channel }} --userversion $version
                env:
                    BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

name: Release

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    build:
        name: Build ${{ matrix.rid }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      rid: win-x64
                      preset: Windows Desktop
                      output: chromonia.exe
                      velopack: true
                    - os: ubuntu-latest
                      rid: linux-x64
                      preset: Linux
                      output: chromonia
                      velopack: false
                    - os: macos-15
                      rid: osx-universal
                      preset: macOS
                      output: chromonia.zip
                      velopack: false

        permissions:
            contents: write

        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    lfs: true

            -   name: Setup .NET
                uses: actions/setup-dotnet@v4
                with:
                    dotnet-version: '8.0.x'

            -   name: Cache NuGet packages
                uses: actions/cache@v4
                with:
                    path: ~/.nuget/packages
                    key: nuget-${{ runner.os }}-${{ hashFiles('Game/**/*.csproj') }}
                    restore-keys: nuget-${{ runner.os }}-

            -   name: Setup Godot
                uses: chickensoft-games/setup-godot@v2
                with:
                    version: 4.6.1
                    use-dotnet: true
                    include-templates: true
                    cache: true

            -   name: Cache Godot import cache
                uses: actions/cache@v4
                with:
                    path: Game/.godot/imported
                    key: godot-import-${{ matrix.rid }}

            -   name: Import project assets
                shell: bash
                working-directory: Game
                env:
                    GODOT_DISABLE_LEAK_CHECKS: 1
                run: godot --headless --import

            -   name: Export
                shell: bash
                working-directory: Game
                env:
                    EnableVersionBump: false
                run: |
                    mkdir -p ../publish/${{ matrix.rid }}
                    godot --headless --export-release "${{ matrix.preset }}" ../publish/${{ matrix.rid }}/${{ matrix.output }}

            # Windows: pack with Velopack
            -   name: Cache Velopack CLI
                if: matrix.velopack
                uses: actions/cache@v4
                with:
                    path: ~/.dotnet/tools
                    key: velopack-cli-${{ runner.os }}

            -   name: Install Velopack CLI
                if: matrix.velopack
                run: dotnet tool install -g vpk || true

            -   name: Pack installer (Windows)
                if: matrix.velopack
                shell: pwsh
                run: |
                    $version = $env:GITHUB_REF_NAME -replace '^v', ''
                    vpk pack `
                      --packId Chromonia `
                      --packVersion $version `
                      --packDir publish/win-x64 `
                      --mainExe chromonia.exe `
                      --outputDir velopack-out

            -   name: Upload to release (Windows Velopack)
                if: matrix.velopack
                shell: bash
                run: gh release upload ${{ github.ref_name }} velopack-out/*
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # macOS: Godot already exports a .zip, upload directly
            -   name: Upload to release (macOS)
                if: matrix.rid == 'osx-universal'
                shell: bash
                run: gh release upload ${{ github.ref_name }} publish/${{ matrix.rid }}/${{ matrix.output }}
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Linux: zip the binary and upload
            -   name: Zip and upload to release (Linux)
                if: matrix.rid == 'linux-x64'
                shell: bash
                run: |
                    cd publish/${{ matrix.rid }}
                    zip -r ../../Chromonia-${{ matrix.rid }}.zip .
                    cd ../..
                    gh release upload ${{ github.ref_name }} Chromonia-${{ matrix.rid }}.zip
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

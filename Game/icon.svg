<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Unclaimed Playfield -->
  <rect width="512" height="512" fill="#121212" rx="64"/>
  
  <!-- ENERGY A CLAIMS (Top portion of the C - Cyan) -->
  <!-- Top Left Block -->
  <rect x="96" y="96" width="100" height="100" fill="#00E6E6"/>
  <!-- Top Center Block -->
  <rect x="196" y="96" width="110" height="100" fill="#00E6E6"/>
  <!-- Top Right Block -->
  <rect x="306" y="96" width="110" height="100" fill="#00E6E6"/>
  
  <!-- ENERGY B CLAIMS (Middle and Bottom portion of the C - Magenta) -->
  <!-- Middle Left Block -->
  <rect x="96" y="196" width="100" height="120" fill="#E600E6"/>
  <!-- Bottom Left Block -->
  <rect x="96" y="316" width="100" height="100" fill="#E600E6"/>
  <!-- Bottom Center Block -->
  <rect x="196" y="316" width="110" height="100" fill="#E600E6"/>
  <!-- Bottom Right Block -->
  <rect x="306" y="316" width="110" height="100" fill="#E600E6"/>
</svg>
